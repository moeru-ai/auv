[package]
name = "auv-tracing-otel"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
readme.workspace = true
license.workspace = true
authors.workspace = true
description.workspace = true
documentation.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
auv-tracing = { path = "../auv-tracing" }
opentelemetry = { version = "0.32", default-features = false, features = ["logs", "trace"] }
opentelemetry_sdk = { version = "0.32", default-features = false, features = ["logs", "trace"] }

[dev-dependencies]
auv-tracing = { path = "../auv-tracing", features = ["memory-store"] }
futures-executor = "0.3"
futures-util = { workspace = true, features = ["io"] }
