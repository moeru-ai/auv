[package]
name = "auv-tracing"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
readme.workspace = true
license.workspace = true
authors.workspace = true
description.workspace = true
documentation.workspace = true
homepage.workspace = true
repository.workspace = true

[features]
default = []
memory-store = []
file-store = ["dep:cap-fs-ext", "dep:cap-std", "dep:fs2", "dep:same-file", "dep:windows-sys"]
rust-tracing = ["dep:tracing"]

[dependencies]
bytes.workspace = true
cap-fs-ext = { version = "4.0.2", optional = true }
cap-std = { version = "4.0.2", optional = true }
futures-core.workspace = true
futures-io.workspace = true
futures-util = { workspace = true, features = ["io", "sink"] }
futures-channel = "0.3"
futures-executor = { version = "0.3", features = ["thread-pool"] }
fs2 = { workspace = true, optional = true }
hex.workspace = true
mime.workspace = true
pin-project = "1"
serde.workspace = true
serde_json = { workspace = true, features = ["arbitrary_precision", "raw_value"] }
sha2.workspace = true
thiserror.workspace = true
time.workspace = true
tracing = { version = "0.1", optional = true }
url = { version = "2", features = ["serde"] }
uuid.workspace = true

[target.'cfg(windows)'.dependencies]
same-file = { version = "1.0.6", optional = true }
windows-sys = { version = "0.61.2", features = ["Win32_Foundation", "Win32_Storage_FileSystem"], optional = true }

[dev-dependencies]
tempfile.workspace = true

[[test]]
name = "dispatch_contract"
required-features = ["memory-store"]

[[test]]
name = "file_store_recovery"
required-features = ["file-store"]

[[test]]
name = "rust_tracing_contract"
required-features = ["rust-tracing"]
