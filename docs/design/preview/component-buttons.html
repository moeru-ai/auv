<!doctype html>
<html lang="en"><head><title>Component Buttons</title><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div class="row">
    <div class="meta">components · buttons</div>
    <div class="spacer"></div>
    <div class="meta">mono ui · 32px height · 4px radius</div>
  </div>
  <div class="row" style="gap:10px; flex-wrap:wrap; align-items:center;">
    <button style="background:#15171a; color:#f6f5f1; border:1px solid #15171a; border-radius:4px; padding:0 14px; height:32px; font-family:var(--auv-font-mono-ui), monospace; font-size:13px; font-weight:500;">replay run</button>
    <button style="background:#00c4d2; color:#fff; border:1px solid #00c4d2; border-radius:4px; padding:0 14px; height:32px; font-family:var(--auv-font-mono-ui), monospace; font-size:13px; font-weight:500;">inspect serve</button>
    <button style="background:transparent; color:#15171a; border:1px solid #d8d5cb; border-radius:4px; padding:0 14px; height:32px; font-family:var(--auv-font-mono-ui), monospace; font-size:13px; font-weight:500;">cancel</button>
    <button style="background:transparent; color:#a73b41; border:1px solid #ebb1b4; border-radius:4px; padding:0 14px; height:32px; font-family:var(--auv-font-mono-ui), monospace; font-size:13px; font-weight:500;">abort run</button>
    <button style="background:#efeee8; color:#5a5e66; border:1px solid #d8d5cb; border-radius:4px; padding:0 14px; height:32px; font-family:var(--auv-font-mono-ui), monospace; font-size:13px; font-weight:500;" disabled>disabled</button>
  </div>
  <div class="row" style="gap:10px; flex-wrap:wrap; align-items:center;">
    <button style="background:transparent; color:#15171a; border:1px solid #d8d5cb; border-radius:4px; padding:0 10px; height:26px; font-family:var(--auv-font-mono-ui), monospace; font-size:12px; font-weight:500;">--dry-run</button>
    <button style="background:transparent; color:#15171a; border:1px solid #d8d5cb; border-radius:4px; padding:0 10px; height:26px; font-family:var(--auv-font-mono-ui), monospace; font-size:12px; font-weight:500;">--all-statuses</button>
    <button style="background:transparent; color:#15171a; border:1px solid #d8d5cb; border-radius:4px; padding:0 10px; height:26px; font-family:var(--auv-font-mono-ui), monospace; font-size:12px; font-weight:500;">--max-disturbance keyboard</button>
  </div>
</div></body></html>
