<!doctype html>
<html lang="en"><head><title>Brand Logo</title><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div class="row">
    <div class="meta">brand · pixel mark + wordmark</div>
    <div class="spacer"></div>
    <div class="meta">8×8 sprite · scale 4</div>
  </div>
  <div style="display:grid; grid-template-columns: 110px 1fr; gap:20px; align-items:center;">
    <img src="../assets/logo-mark.svg" alt="" style="width:96px; height:96px; image-rendering:pixelated;">
    <div class="col" style="gap:8px;">
      <img src="../assets/logo-wordmark.svg" alt="" style="height:48px; width:auto; image-rendering:pixelated;">
      <div style="font-family:var(--auv-font-sans), sans-serif; font-size:12px; line-height:1.5; color:#2c2f34;">Pixel-art A + sparkle + V on sticker-outlined dark tile. Mirrors the moeru-ai mark's cyan/lime split — A in moe-cyan, V in AI-lime.</div>
    </div>
  </div>
</div></body></html>
