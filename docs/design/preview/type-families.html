<!doctype html>
<html lang="en"><head><title>Type Families</title><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div class="row">
    <div class="meta">type · families</div>
    <div class="spacer"></div>
    <div class="meta">geist · jetbrains mono · geist mono</div>
  </div>
  <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:18px;">
    <div class="col" style="gap:8px;">
      <div style="font-family:var(--auv-font-sans), sans-serif; font-size:38px; line-height:1; font-weight:500; color:#15171a; letter-spacing:-0.012em;">Aa</div>
      <div style="font-family:var(--auv-font-mono), monospace; font-size:11px; color:#5a5e66;">Geist · 300/400/500/600/700</div>
      <div style="font-family:var(--auv-font-sans), sans-serif; font-size:13px; color:#2c2f34; line-height:1.45;">UI prose, headings, navigation. Mid-weight ceiling.</div>
    </div>
    <div class="col" style="gap:8px;">
      <div style="font-family:var(--auv-font-mono), monospace; font-size:38px; line-height:1; font-weight:600; color:#15171a;">Aa</div>
      <div style="font-family:var(--auv-font-mono), monospace; font-size:11px; color:#5a5e66;">JetBrains Mono · 400/500/600/700</div>
      <div style="font-family:var(--auv-font-sans), sans-serif; font-size:13px; color:#2c2f34; line-height:1.45;">IDs, run IDs, code, JSON, span names, pills.</div>
    </div>
    <div class="col" style="gap:8px;">
      <div style="font-family:var(--auv-font-mono-ui), monospace; font-size:38px; line-height:1; font-weight:500; color:#15171a;">Aa</div>
      <div style="font-family:var(--auv-font-mono), monospace; font-size:11px; color:#5a5e66;">Geist Mono · 400/500/600</div>
      <div style="font-family:var(--auv-font-sans), sans-serif; font-size:13px; color:#2c2f34; line-height:1.45;">Chrome mono — chip text, table headers, micro-caps.</div>
    </div>
  </div>
</div></body></html>
