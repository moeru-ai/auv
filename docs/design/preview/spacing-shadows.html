<!doctype html>
<html lang="en"><head><title>Spacing Shadows</title><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card" style="background:#efeee8;">
  <div class="row">
    <div class="meta">spacing · shadows</div>
    <div class="spacer"></div>
    <div class="meta">used sparingly · popovers + panels</div>
  </div>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:18px; padding:14px 6px;">
    <div class="col" style="gap:8px; align-items:flex-start;">
      <div style="width:96px; height:64px; background:#f6f5f1; border-radius:6px; border:1px solid #d8d5cb;"></div>
      <div class="swatch__name">shadow-0</div>
      <div class="swatch__hex">flat hairline</div>
    </div>
    <div class="col" style="gap:8px; align-items:flex-start;">
      <div style="width:96px; height:64px; background:#f6f5f1; border-radius:6px; box-shadow: 0 1px 0 rgba(20,22,26,0.04), 0 1px 2px rgba(20,22,26,0.06);"></div>
      <div class="swatch__name">shadow-1</div>
      <div class="swatch__hex">card · lifted</div>
    </div>
    <div class="col" style="gap:8px; align-items:flex-start;">
      <div style="width:96px; height:64px; background:#f6f5f1; border-radius:6px; box-shadow: 0 2px 4px rgba(20,22,26,0.06), 0 4px 12px rgba(20,22,26,0.08);"></div>
      <div class="swatch__name">shadow-2</div>
      <div class="swatch__hex">panel</div>
    </div>
    <div class="col" style="gap:8px; align-items:flex-start;">
      <div style="width:96px; height:64px; background:#f6f5f1; border-radius:6px; box-shadow: 0 8px 24px rgba(20,22,26,0.10), 0 2px 6px rgba(20,22,26,0.06);"></div>
      <div class="swatch__name">shadow-pop</div>
      <div class="swatch__hex">popover · menu</div>
    </div>
  </div>
</div></body></html>
