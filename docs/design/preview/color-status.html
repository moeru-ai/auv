<!doctype html>
<html lang="en"><head><title>Color Status</title><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div class="row">
    <div class="meta">status · vocabulary</div>
    <div class="spacer"></div>
    <div class="meta">map 1:1 onto recipe + bundle json</div>
  </div>
  <div style="display:grid; grid-template-columns: repeat(6, 1fr); gap:10px;">
    <div class="col" style="gap:6px;"><div class="swatch__chip" style="background:#2f7d4f; height:48px"></div><div class="swatch__name">validated</div><div class="swatch__hex">#2f7d4f</div><div class="swatch__chip" style="background:#dff0e3; height:14px; border:1px solid #b6d8be"></div></div>
    <div class="col" style="gap:6px;"><div class="swatch__chip" style="background:#b46a14; height:48px"></div><div class="swatch__name">candidate</div><div class="swatch__hex">#b46a14</div><div class="swatch__chip" style="background:#fbecd3; height:14px; border:1px solid #e8c990"></div></div>
    <div class="col" style="gap:6px;"><div class="swatch__chip" style="background:#a73b41; height:48px"></div><div class="swatch__name">boundary</div><div class="swatch__hex">#a73b41</div><div class="swatch__chip" style="background:#f7dcde; height:14px; border:1px solid #ebb1b4"></div></div>
    <div class="col" style="gap:6px;"><div class="swatch__chip" style="background:#4a5462; height:48px"></div><div class="swatch__name">frozen</div><div class="swatch__hex">#4a5462</div><div class="swatch__chip" style="background:#e3e7ec; height:14px; border:1px solid #c3cad3"></div></div>
    <div class="col" style="gap:6px;"><div class="swatch__chip" style="background:#1f7d8c; height:48px"></div><div class="swatch__name">running</div><div class="swatch__hex">#1f7d8c</div><div class="swatch__chip" style="background:#d3eaee; height:14px; border:1px solid #99ccd3"></div></div>
    <div class="col" style="gap:6px;"><div class="swatch__chip" style="background:#c0392b; height:48px"></div><div class="swatch__name">failed</div><div class="swatch__hex">#c0392b</div><div class="swatch__chip" style="background:#fadcd7; height:14px; border:1px solid #f0a99e"></div></div>
  </div>
  <div class="row" style="gap:8px; flex-wrap:wrap;">
    <span class="pill pill--validated">validated</span>
    <span class="pill pill--candidate">candidate</span>
    <span class="pill pill--boundary">not-validated</span>
    <span class="pill pill--frozen">phase-1-frozen</span>
    <span class="pill pill--running">running</span>
    <span class="pill pill--failed">failed</span>
  </div>
</div></body></html>
