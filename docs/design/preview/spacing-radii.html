<!doctype html>
<html lang="en"><head><title>Spacing Radii</title><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <div class="row">
    <div class="meta">spacing · radii</div>
    <div class="spacer"></div>
    <div class="meta">restrained, hardware-feeling</div>
  </div>
  <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap:14px;">
    <div class="col" style="gap:6px; align-items:flex-start;"><div style="width:64px; height:64px; background:#16181d; border-radius:0;"></div><div class="swatch__name">radius-0</div><div class="swatch__hex">0 · borders</div></div>
    <div class="col" style="gap:6px; align-items:flex-start;"><div style="width:64px; height:64px; background:#16181d; border-radius:2px;"></div><div class="swatch__name">radius-1</div><div class="swatch__hex">2px · pills</div></div>
    <div class="col" style="gap:6px; align-items:flex-start;"><div style="width:64px; height:64px; background:#16181d; border-radius:4px;"></div><div class="swatch__name">radius-2</div><div class="swatch__hex">4px · inputs</div></div>
    <div class="col" style="gap:6px; align-items:flex-start;"><div style="width:64px; height:64px; background:#16181d; border-radius:6px;"></div><div class="swatch__name">radius-3</div><div class="swatch__hex">6px · cards</div></div>
    <div class="col" style="gap:6px; align-items:flex-start;"><div style="width:64px; height:64px; background:#16181d; border-radius:8px;"></div><div class="swatch__name">radius-4</div><div class="swatch__hex">8px · large</div></div>
  </div>
</div></body></html>
