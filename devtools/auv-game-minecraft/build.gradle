plugins {
  id 'fabric-loom' version '1.11.7'
  id 'maven-publish'
}

group = 'ai.moeru.auv.minecraft'
version = '0.0.1'
def modVersion = version

repositories {
  mavenCentral()
  maven {
    name = 'Fabric'
    url = 'https://maven.fabricmc.net/'
  }
}

dependencies {
  minecraft 'com.mojang:minecraft:1.21.1'
  mappings 'net.fabricmc:yarn:1.21.1+build.3:v2'
  modImplementation 'net.fabricmc:fabric-loader:0.16.10'
  modImplementation 'net.fabricmc.fabric-api:fabric-api:0.116.6+1.21.1'
}

base {
  archivesName = 'auv-minecraft-telemetry'
}

java {
  toolchain {
    languageVersion = JavaLanguageVersion.of(21)
  }
  withSourcesJar()
}

tasks.withType(JavaCompile).configureEach {
  it.options.release = 21
}

processResources {
  inputs.property 'version', modVersion

  filesMatching('fabric.mod.json') {
    expand 'version': modVersion
  }
}

publishing {
  publications {
    mavenJava(MavenPublication) {
      from components.java
    }
  }
}
