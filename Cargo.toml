[workspace]
members = [
  "."
]

[workspace.package]
version = "0.0.1"
authors = [ "Moeru AI" ]
edition = "2024"
rust-version = "1.91"
description = ""
documentation = "https://github.com/moeru-ai/auv"
readme = "README.md"
homepage = "https://github.com/moeru-ai/auv"
repository = "https://github.com/moeru-ai/auv"
license = ""
publish = false

[package]
name = "auv-cli"
version.workspace = true
edition.workspace = true
publish.workspace = true
readme.workspace = true
license.workspace = true
authors.workspace = true
description.workspace = true
documentation.workspace = true
homepage.workspace = true
repository.workspace = true

[workspace.dependencies]

[dependencies]
axum = { version = "0.8", features = ["ws"] }
semver = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["fs", "macros", "net", "rt-multi-thread", "sync"] }
xcap = "0.6"
image = { version = "0.25", default-features = false, features = ["png"] }

[target.'cfg(target_os = "macos")'.dependencies]
objc2-core-graphics = { version = "0.3", features = ["CGWindow", "CGImage", "CGDataProvider", "CGGeometry"] }
objc2-core-foundation = "0.3"
swift-bridge = "0.1.59"

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }

[target.'cfg(target_os = "macos")'.build-dependencies]
swift-bridge-build = "0.1.59"
