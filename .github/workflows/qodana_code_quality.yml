name: Qodana
on:
  workflow_dispatch:
  schedule:
    # Weekly observatory scan (Monday 06:00 UTC).
    - cron: '0 6 * * 1'
  pull_request:
  push:
    branches:
      - main
      - 'releases/*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.job }}
  cancel-in-progress: true

jobs:
  qodana-observatory:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Qodana Observatory Scan
        id: qodana-observatory
        uses: JetBrains/qodana-action@v2026.1
        with:
          args: >-
            --profile-path .qodana/profiles/observatory.yaml
            -e CARGO_HOME=/tmp/qodana-cargo-home
            -e CARGO_TARGET_DIR=/tmp/qodana-target
          upload-result: true
          artifact-name: qodana-observatory-report
          use-annotations: true
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
          QODANA_ENDPOINT: https://qodana.cloud
      # NOTICE(qodana-sarif-compat): GitHub Code Scanning currently rejects
      # Qodana SARIF when it contains empty-message `Annotator` results.
      # Keep observatory in Qodana Cloud + workflow artifacts until we add
      # a sanitizer step or JetBrains/GitHub compatibility lands upstream.
      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qodana-observatory-results
          path: ${{ runner.temp }}/qodana/results/
          retention-days: 14

  # PR runs consume Qodana as incremental analysis; push runs keep main/releases
  # aligned to the same blocking subset. Not run on schedule/workflow_dispatch.
  qodana-gate:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          submodules: recursive
      - name: Qodana Gate Scan
        uses: JetBrains/qodana-action@v2026.1
        with:
          args: >-
            --profile-path .qodana/profiles/gate.yaml
            --fail-threshold 20000
            -e CARGO_HOME=/tmp/qodana-cargo-home
            -e CARGO_TARGET_DIR=/tmp/qodana-target
          upload-result: true
          artifact-name: qodana-gate-report
          use-annotations: true
          post-pr-comment: true
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
          QODANA_ENDPOINT: https://qodana.cloud
      # NOTICE(qodana-sarif-compat): same compatibility boundary as observatory.
      # Gate still blocks via Qodana exit status / fail-threshold / PR comment,
      # but does not upload invalid SARIF into GitHub Code Scanning for now.
