####################################################################################################################
# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report. #
####################################################################################################################

# Shared bootstrap and path excludes for all Qodana CI jobs.
# CI reads this file by default; jobs select profile overlays via --profile-path.
# See docs/ai/references/2026-07-03-auv-qodana-operating-model.md

version: "1.0"
linter: qodana-rust

# NOTICE(qodana-environment_limitation): Cargo metadata and submodules required for accurate Rust indexing in CI.
bootstrap: |
  set -eu
  export CARGO_HOME="${CARGO_HOME:-/tmp/qodana-cargo-home}"
  export CARGO_TARGET_DIR="${CARGO_TARGET_DIR:-/tmp/qodana-target}"
  mkdir -p "$CARGO_HOME" "$CARGO_TARGET_DIR"
  cargo fetch --locked
  cargo metadata --format-version 1 --all-features > /dev/null

exclude:
  # NOTICE(qodana-environment_limitation): editor state and archived references are out of scan scope.
  - name: All
    paths:
      - .cursor
      - docs/archive
  # NOTICE(qodana-no-spellcheck): spelling churn in identifiers, fixtures, and mixed-language docs is not part of this lane's quality signal.
  - name: SpellCheckingInspection
  # NOTICE(qodana-false_positive): swift-bridge generated bindings use `self` in FFI shims.
  - name: RsFunctionCannotHaveSelf
    paths:
      - crates/auv-overlay-macos/src/native/binding.rs
      - crates/auv-driver-macos/src/native/binding.rs
  # NOTICE(qodana-false_positive): optional inference features are not resolved in default metadata graphs.
  - name: TomlUnresolvedReference
    paths:
      - crates/auv-inference-ort/Cargo.toml
      - crates/auv-inference-ultralytics/Cargo.toml
  # NOTICE(qodana-false_positive): intentional `if false` test stubs in macOS session helpers.
  - name: RsConstantConditionIf
    paths:
      - crates/auv-driver-macos/src/session.rs
  # NOTICE(qodana-archived_lane_exemption): minecraft vertical is frozen; deprecations are expected.
  - name: RsDeprecation
    paths:
      - crates/auv-game-minecraft
  # NOTICE(qodana-false_positive): cfg(feature) catch-all arm is unreachable in single-feature CI builds.
  - name: RsUnreachablePatterns
    paths:
      - crates/auv-inference-ort/src/lib.rs
  # NOTICE(qodana-false_positive): `reason` is consumed by unreachable! macro expansion.
  - name: RsLiveness
    paths:
      - src/inference_recognition.rs
  # NOTICE(qodana-source_scope): JSON fixtures and broken-schema witnesses are
  # outside this lane's source-quality signal; the Cloud toggles are kept here
  # in the repository root so CI and local Qodana consume one shared truth.
  - name: JsonSchemaCompliance
  - name: JsonStandardCompliance
  - name: Json5StandardCompliance
  - name: JsonSchemaDeprecation
  - name: JsonDuplicatePropertyKeys
  - name: JsonSchemaRefReference
  - name: JsonPathUnknownFunction
  - name: JsonPathUnknownOperator
  - name: JsonPathEvaluateUnknownKey
  # NOTICE(qodana-source_scope): SVG artwork in `docs/design/assets` is not a
  # maintained XML quality surface for this repository; suppress the same XML
  # inspections the Qodana Cloud profile toggles expose.
  - name: XmlDeprecatedElement
  - name: XmlDuplicatedId
  - name: CheckTagEmptyBody
  - name: CheckXmlFileWithXercesValidator
  - name: XmlDefaultAttributeValue
  - name: XmlUnboundNsPrefix
  - name: XmlInvalidId
  - name: CheckDtdRefs
  - name: XmlPathReference
  - name: XmlUnresolvedReference
  - name: XmlUnusedNamespaceDeclaration
  - name: XmlWrongRootElement
  - name: XmlHighlighting
  # NOTICE(qodana-source_scope): proofreading and language-detection signal is
  # intentionally out of scope for this repository; mixed-language docs,
  # identifiers, fixtures, and generated/vendor content make these inspections
  # high-noise and low-value for the current quality gate.
  - name: GrazieInspection
  - name: GrazieInspectionRunner
  - name: LanguageDetectionInspection
  - name: GrazieStyle
  # NOTICE(qodana-source_scope): structural-search and ignore-file hygiene are
  # not part of the active CI quality bar; keep Rust/config/runtime signal and
  # suppress repository-management noise instead.
  - name: SSBasedInspection
  - name: IgnoreFileDuplicateEntry
  - name: Annotator
    paths:
      - crates/auv-game-balatro/tests/fixtures/balatro_consumption_probe/witness/failed_expected_slots.json
      - crates/auv-game-balatro/tests/fixtures/balatro_consumption_probe/broken/bad_schema/detection_bundle.json
      - crates/auv-game-balatro/tests/fixtures/balatro_consumption_probe/broken/bad_schema
      - crates/auv-game-balatro/tests/fixtures/balatro_consumption_probe/witness
  - name: YAMLSchemaValidation
    paths:
      - .qodana/profiles/qodana.yaml
