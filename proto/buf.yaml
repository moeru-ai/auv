version: v2
modules:
  - path: .
lint:
  use:
    - STANDARD
  except:
    # AUV uses `auv.api.v1.<domain>` packages so generated Rust modules read as
    # `v1::<domain>` instead of duplicating the version as `<domain>::v1`.
    - PACKAGE_DIRECTORY_MATCH
    - PACKAGE_VERSION_SUFFIX
breaking:
  use:
    - FILE
